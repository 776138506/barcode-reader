name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_dir: dist/BarcodeReader
            package: zip
          - os: macos-latest
            artifact_dir: dist/BarcodeReader.app
            package: zip
          - os: ubuntu-latest
            artifact_dir: dist/BarcodeReader
            package: tar
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install X11/GL libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests before packaging
        run: python -m pytest tests/ -q

      - name: Build executable (PyInstaller)
        run: python build.py

      - name: Verify artifact exists
        run: |
          if (Test-Path "${{ matrix.artifact_dir }}") { exit 0 } else { exit 1 }
        shell: pwsh

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist/BarcodeReader" -DestinationPath "barcode-reader-windows.zip" -Force
        shell: pwsh

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/BarcodeReader.app" "barcode-reader-macos.zip"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "barcode-reader-linux.tar.gz" -C dist BarcodeReader

      - name: Create or update GitHub Release
        run: |
          set -e
          PKG=$(ls barcode-reader-*)
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" $PKG --clobber
          else
            gh release create "${{ github.ref_name }}" $PKG \
              --title "${{ github.ref_name }}" --generate-notes
          fi
        shell: bash
